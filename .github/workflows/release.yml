name: Release

on:
  workflow_dispatch:
    inputs:
      worker_url:
        description: "Optional hosted worker URL for static web builds"
        required: false
        default: ""

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  pages:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pages: write
      id-token: write
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v6
        with:
          node-version: 24
          package-manager-cache: false
      - run: corepack enable
      - run: corepack prepare pnpm@10.33.1 --activate
      - uses: actions/configure-pages@v5
      - run: pnpm install --frozen-lockfile
      - run: pnpm build
        env:
          FILESQL_BASE_PATH: /duckdb-file-sql/
          VITE_FILESQL_WORKER_URL: ${{ inputs.worker_url }}
      - uses: actions/upload-pages-artifact@v3
        with:
          path: packages/web/dist

  deploy-pages:
    runs-on: ubuntu-latest
    needs: pages
    permissions:
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4

  worker-image:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v5
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ github.token }}
      - uses: docker/metadata-action@v5
        id: meta
        with:
          images: ghcr.io/${{ github.repository }}-worker
          tags: |
            type=sha,format=short
            type=raw,value=latest,enable={{is_default_branch}}
      - uses: docker/build-push-action@v6
        with:
          context: apps/worker
          file: apps/worker/Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}

  publish-core:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v6
        with:
          node-version: 24
          registry-url: https://registry.npmjs.org
          package-manager-cache: false
      - run: corepack enable
      - run: corepack prepare pnpm@10.33.1 --activate
      - run: pnpm install --frozen-lockfile
      - run: pnpm --filter @chayprabs/duckdb-file-sql build
      - name: Publish package when token is available
        run: |
          if [ -n "${NODE_AUTH_TOKEN}" ]; then
            pnpm --filter @chayprabs/duckdb-file-sql publish --no-git-checks --access public
          else
            echo "NPM_TOKEN is not configured; skipping npm publish."
          fi
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
