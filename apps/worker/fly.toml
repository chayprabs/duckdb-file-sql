app = "filesql-worker"
primary_region = "iad"

[build]
  dockerfile = "Dockerfile"

[env]
  FILESQL_RETENTION_MINUTES = "10"

[http_service]
  internal_port = 8000
  force_https = true
  auto_stop_machines = "stop"
  auto_start_machines = true
  min_machines_running = 0

  [[http_service.checks]]
    grace_period = "10s"
    interval = "30s"
    method = "GET"
    timeout = "5s"
    path = "/health"

  [http_service.concurrency]
    type = "requests"
    soft_limit = 25
    hard_limit = 50

[[vm]]
  memory = "8gb"
  cpu_kind = "shared"
  cpus = 2
